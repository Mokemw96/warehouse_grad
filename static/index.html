<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sports Warehouse Admin</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Warehouse Admin</p>
          <h1>Sports Inventory</h1>
        </div>
        <div class="status-summary">
          <span id="item-count">Loading...</span>
        </div>
      </header>

      <main>
        <section class="panel">
          <div class="panel-header">
            <div>
              <h2>Inventory table</h2>
            </div>
            <div class="panel-actions">
              <button id="add-item-button" class="add-button">+ Add Item</button>
              <span id="status-text">Waiting for inventory...</span>
            </div>
          </div>

          <div class="table-wrapper">
            <table id="inventory-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Item</th>
                  <th>Sport</th>
                  <th>Quantity</th>
                  <th>Price</th>
                  <th>Supplier</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr><td colspan="7" class="empty">Loading inventory...</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>

      <div id="add-item-modal" class="modal">
        <div class="modal-content">
          <div class="modal-header">
            <h2>Add New Item</h2>
            <button id="close-modal" class="close-button">&times;</button>
          </div>
          <form id="add-item-form" class="form-container">
            <div class="form-group">
              <label for="item-name">Item Name</label>
              <input type="text" id="item-name" name="item_name" required />
            </div>
            <div class="form-group">
              <label for="sport">Sport</label>
              <input type="text" id="sport" name="sport" required />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" required />
              </div>
              <div class="form-group">
                <label for="price">Price</label>
                <input type="number" id="price" name="price" step="0.01" required />
              </div>
            </div>
            <div class="form-group">
              <label for="supplier">Supplier</label>
              <input type="text" id="supplier" name="supplier" />
            </div>
            <div class="form-actions">
              <button type="button" id="cancel-button" class="cancel-button">Cancel</button>
              <button type="submit" class="submit-button">Add Item</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
